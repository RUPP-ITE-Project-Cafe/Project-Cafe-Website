<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Responsive Top Navigation</title>
        <link rel="stylesheet" href="topnav.css">
    </head>
    <body>
    <nav aria-label="Primary">
        <div class="nav-inner">
        <div class="brand"><a href="#">WCT</a></div>

        <!-- Mobile toggle (checkbox hack) -->
        <input id="nav-toggle" class="toggle" type="checkbox" aria-controls="primary-menu" aria-expanded="false" />
        <label for="nav-toggle" class="toggle-label" aria-label="Toggle navigation">☰ <span>Menu</span></label>

        <ul id="primary-menu" class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Course</a></li>
            <li><a href="#">Labs</a></li>
            <li><a href="#">Resources</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </div>
    </nav>

    <main>
        <h1>Responsive Top Navigation</h1>
        <p>Resize the browser to see the menu collapse into a mobile toggle at ≤640px.</p>
    </main>
    </body>
